name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Abhängigkeiten installieren
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest ruff mypy

      - name: Lint (ruff)
        run: ruff check .

      - name: Typen (mypy)
        run: mypy GitHubFollowerCheckerGUI.py GitHubFollowerCheckerCLI.py

      - name: Syntax-Check
        run: python -m py_compile GitHubFollowerCheckerGUI.py GitHubFollowerCheckerCLI.py

      - name: Tests (pytest unter Xvfb)
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb
          xvfb-run -a python -m pytest -q
