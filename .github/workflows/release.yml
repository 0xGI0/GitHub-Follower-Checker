name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            asset: GitHubFollowerChecker-linux
          - os: windows-latest
            asset: GitHubFollowerChecker.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Abhängigkeiten installieren
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt flet-cli pyinstaller

      - name: Binary bauen
        run: >
          flet pack GitHubFollowerCheckerGUI.py
          --name GitHubFollowerChecker
          --icon docs/icon.ico

      - name: Artefakt umbenennen (Linux)
        if: runner.os == 'Linux'
        run: mv dist/GitHubFollowerChecker "dist/${{ matrix.asset }}"

      - name: An Release anhängen
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.asset }}
          generate_release_notes: true
