name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            binary: GitHubFollowerChecker
            asset: GitHubFollowerChecker-${{ github.ref_name }}-linux-x86_64
          - os: windows-latest
            binary: GitHubFollowerChecker.exe
            asset: GitHubFollowerChecker-${{ github.ref_name }}-windows-x86_64.exe
          - os: macos-latest
            asset: GitHubFollowerChecker-${{ github.ref_name }}-macos-arm64.zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Abhängigkeiten installieren
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt flet-cli pyinstaller

      - name: Binary bauen (Linux/Windows)
        if: runner.os != 'macOS'
        run: >
          flet pack GitHubFollowerCheckerGUI.py
          --name GitHubFollowerChecker
          --icon docs/icon.ico

      # macOS: flet pack erzeugt ein .app-Bundle; als ZIP anhängen (.ico wird
      # unter macOS nicht unterstützt, daher ohne --icon)
      - name: App bauen (macOS)
        if: runner.os == 'macOS'
        run: |
          flet pack GitHubFollowerCheckerGUI.py --name GitHubFollowerChecker
          ditto -c -k --keepParent dist/GitHubFollowerChecker.app "dist/${{ matrix.asset }}"

      - name: Artefakt umbenennen (Linux/Windows)
        if: runner.os != 'macOS'
        run: mv "dist/${{ matrix.binary }}" "dist/${{ matrix.asset }}"

      - name: An Release anhängen
        uses: softprops/action-gh-release@v3
        with:
          files: dist/${{ matrix.asset }}
          generate_release_notes: true
